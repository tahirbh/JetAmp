name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        working-directory: app
        run: npm install --legacy-peer-deps

      - name: Build Web App
        working-directory: app
        run: npm run build

      - name: Verify Project Structure
        run: |
          echo "Checking root directory:"
          ls -F
          echo "Checking app directory:"
          ls -F app
          echo "Checking dist directory:"
          ls -F app/dist || echo "DIST NOT FOUND"

      - name: Capacitor Copy (Web Assets)
        working-directory: app
        run: npx cap copy android

      - name: Capacitor Update (Native Plugins)
        working-directory: app
        run: npx cap update android

      - name: Build APK with Gradle
        working-directory: app/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: jetamp-debug-apk
          path: app/android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-error-logs
          path: |
            app/sync_log.txt
            app/android/app/build/reports/
